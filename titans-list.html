<html lang="ko">
<head>
<meta charset="UTF-8">

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0b10;--surface:#12141d;--surface2:#1a1d2a;--surface3:#232738;
  --border:rgba(255,255,255,0.06);--border-hover:rgba(255,255,255,0.14);
  --text:#e8e8ed;--text-sub:#8b8fa3;--text-muted:#4a4e62;
  --accent:#6366f1;--accent-light:#818cf8;
}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

.header{text-align:center;padding:3rem 1.5rem 1rem}
.header h1{font-size:32px;font-weight:900;letter-spacing:-0.04em;
  background:linear-gradient(135deg,#e8e8ed 30%,var(--accent-light) 70%,#c084fc);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header p{font-size:14px;color:var(--text-sub);margin-top:8px}

/* 필터 */
.filters{max-width:1200px;margin:1.5rem auto;padding:0 1.5rem;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.filter-btn{
  font-size:12px;padding:6px 14px;border-radius:20px;border:1px solid var(--border);
  background:transparent;color:var(--text-sub);cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif;
}
.filter-btn:hover,.filter-btn.active{background:var(--accent);border-color:var(--accent);color:white}
.search-box{
  flex:1;min-width:200px;padding:8px 14px;border-radius:20px;border:1px solid var(--border);
  background:var(--surface);color:var(--text);font-size:13px;font-family:'Inter',sans-serif;outline:none;
}
.search-box:focus{border-color:var(--accent)}
.search-box::placeholder{color:var(--text-muted)}
.count-badge{font-size:12px;color:var(--text-muted);font-family:'JetBrains Mono',monospace;margin-left:auto}

/* 테이블 */
.table-wrap{max-width:1200px;margin:1rem auto;padding:0 1.5rem}
table{width:100%;border-collapse:collapse}
thead th{
  text-align:left;font-size:11px;font-weight:600;color:var(--text-muted);
  padding:10px 12px;border-bottom:1px solid var(--border);letter-spacing:0.05em;text-transform:uppercase;
  cursor:pointer;user-select:none;white-space:nowrap;
}
thead th:hover{color:var(--text-sub)}
tbody tr{border-bottom:1px solid var(--border);transition:background .15s}
tbody tr{cursor:pointer}
tbody tr:hover{background:var(--surface)}
.feed-panel{display:none;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:1rem 1.25rem;margin:6px 0 12px;animation:feedSlide .3s ease}
.feed-panel.open{display:block}
@keyframes feedSlide{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.feed-panel-title{font-size:12px;font-weight:600;color:var(--accent-light);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.feed-panel-items{display:flex;flex-direction:column;gap:8px}
.fp-item{background:var(--surface3);border-radius:8px;padding:10px 14px;transition:background .15s}
.fp-item:hover{background:rgba(255,255,255,0.06)}
.fp-item a{color:var(--text);text-decoration:none;display:block}
.fp-item-title{font-size:13px;font-weight:500;line-height:1.5;margin-bottom:4px}
.fp-item-meta{font-size:10px;color:var(--text-muted);font-family:'JetBrains Mono',monospace;display:flex;gap:10px}
.fp-loading{text-align:center;padding:1.5rem;color:var(--text-muted);font-size:12px}
.fp-loading .spinner{width:20px;height:20px;border:2px solid var(--surface3);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;margin:0 auto 8px}
@keyframes spin{to{transform:rotate(360deg)}}
.live-badge{display:inline-flex;align-items:center;gap:4px;font-size:9px;padding:2px 7px;border-radius:10px;background:rgba(34,197,94,0.15);color:#4ade80;font-weight:600;margin-left:8px}
.live-badge::before{content:'';width:5px;height:5px;border-radius:50%;background:#4ade80}
td{padding:12px;font-size:13px;vertical-align:middle}
.t-num{color:var(--text-muted);font-family:'JetBrains Mono',monospace;font-size:11px;width:36px}
.t-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:white;flex-shrink:0}
.t-name-cell{display:flex;align-items:center;gap:12px}
.t-name{font-weight:600;font-size:13px}
.t-role{font-size:11px;color:var(--text-sub);margin-top:2px;max-width:280px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.t-cat{font-size:10px;padding:3px 8px;border-radius:10px;font-weight:500;white-space:nowrap}
.t-channels{display:flex;gap:4px;flex-wrap:wrap}
.t-ch{font-size:9px;padding:2px 6px;border-radius:4px;background:var(--surface2);color:var(--text-muted);
  font-family:'JetBrains Mono',monospace;white-space:nowrap}
.t-impact{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600}

/* 카테고리 색상 */
.cat-ai{background:rgba(99,102,241,0.15);color:#818cf8}
.cat-science{background:rgba(59,130,246,0.15);color:#93c5fd}
.cat-tech{background:rgba(34,197,94,0.15);color:#86efac}
.cat-business{background:rgba(245,158,11,0.15);color:#fcd34d}
.cat-philosophy{background:rgba(168,85,247,0.15);color:#c4b5fd}
.cat-health{background:rgba(236,72,153,0.15);color:#f9a8d4}
.cat-finance{background:rgba(239,68,68,0.15);color:#fca5a5}
.cat-design{background:rgba(20,184,166,0.15);color:#5eead4}

.footer{text-align:center;padding:2rem;font-size:11px;color:var(--text-muted);border-top:1px solid var(--border);margin-top:2rem}

@media(max-width:768px){
  .t-role{max-width:160px}
  td:nth-child(5),th:nth-child(5){display:none}
  td:nth-child(6),th:nth-child(6){display:none}
}
@media(max-width:480px){
  td:nth-child(4),th:nth-child(4){display:none}
}
</style>

const CAT_CLASS = {AI:'cat-ai',Science:'cat-science',Tech:'cat-tech',Business:'cat-business',
  Philosophy:'cat-philosophy',Health:'cat-health',Finance:'cat-finance',Design:'cat-design'};

let currentFilter = 'all';
let searchQuery = '';

function getInitials(name){return name.split(' ').map(w=>w[0]).join('').substring(0,2)}

function renderTable(){
  let filtered = TITANS;
  if(currentFilter!=='all') filtered = filtered.filter(t=>t.c===currentFilter);
  if(searchQuery){
    const q=searchQuery.toLowerCase();
    filtered=filtered.filter(t=>t.n.toLowerCase().includes(q)||t.r.toLowerCase().includes(q)||t.k.toLowerCase().includes(q));
  }
  filtered.sort((a,b)=>b.impact-a.impact);

  document.getElementById('count-badge').textContent=filtered.length+'명';
  // LIVE 타이탄 페이지 맵
  const LIVE_PAGES = {
    'Stephen Wolfram':'wolfram.html','Bill Gates':'gates.html','Elon Musk':'musk.html',
    'Jeff Bezos':'bezos.html','Dario Amodei':'amodei.html','Ray Dalio':'dalio.html',
    'Sam Altman':'altman.html','Jensen Huang':'huang.html','Satya Nadella':'nadella.html',
    'Andrej Karpathy':'karpathy.html','Yann LeCun':'lecun.html','Andrew Huberman':'huberman.html',
    'Sundar Pichai':'pichai.html'
  };

  document.getElementById('titans-body').innerHTML=filtered.map((t,i)=>{
    const rid='row-'+i;
    const isLive=LIVE_PAGES[t.n];
    const liveBadge=isLive?'<span class="live-badge">LIVE</span>':'';
    const pageLink=isLive?` <a href="${isLive}" style="font-size:10px;color:var(--accent-light);margin-left:6px" onclick="event.stopPropagation()">→ 상세</a>`:'';
    return `<tr onclick="toggleFeedPanel('${rid}','${t.n.replace(/'/g,"\\'")}')">
      <td class="t-num">${String(i+1).padStart(2,'0')}</td>
      <td><div class="t-name-cell">
        <div class="t-avatar" style="background:${t.color}">${getInitials(t.n)}</div>
        <div><div class="t-name">${t.n}${liveBadge}${pageLink}</div><div class="t-role">${t.r}</div></div>
      </div></td>
      <td><span class="t-cat ${CAT_CLASS[t.c]}">${t.c}</span></td>
      <td class="t-impact" style="color:${t.impact>=95?'#22c55e':t.impact>=90?'#6366f1':t.impact>=85?'#f59e0b':'var(--text-sub)'}">${t.impact}</td>
      <td><div class="t-channels">${t.ch.map(c=>'<span class="t-ch">'+c+'</span>').join('')}</div></td>
      <td style="font-size:11px;color:var(--text-sub);max-width:200px">${t.k}</td>
    </tr>
    <tr id="${rid}" style="display:none"><td colspan="6" style="padding:0">
      <div class="feed-panel open" id="fp-${rid}">
        <div class="feed-panel-title">📰 ${t.n} 최신 뉴스 <span style="font-size:10px;color:var(--text-muted);font-weight:400">Google News</span></div>
        <div class="feed-panel-items" id="fpi-${rid}"><div class="fp-loading"><div class="spinner"></div>로딩 중...</div></div>
      </div>
    </td></tr>`;
  }).join('');
}

function filterCat(cat){
  currentFilter=cat;
  document.querySelectorAll('.filter-btn').forEach(b=>{
    const label=b.textContent.trim();
    const catMap={'전체':'all','🤖 AI':'AI','🔬 과학':'Science','💻 테크':'Tech','💼 비즈니스':'Business',
      '🧠 사상':'Philosophy','🧬 헬스/바이오':'Health','💰 금융':'Finance','🎨 디자인':'Design'};
    b.classList.toggle('active',catMap[label]===cat);
  });
  renderTable();
}
function searchTitans(q){searchQuery=q;renderTable();}

const _openPanels=new Set();
async function toggleFeedPanel(rid,name){
  const row=document.getElementById(rid);
  if(!row)return;
  if(row.style.display!=='none'){row.style.display='none';_openPanels.delete(rid);return;}
  row.style.display='table-row';
  _openPanels.add(rid);
  const container=document.getElementById('fpi-'+rid);
  if(container.dataset.loaded)return;
  container.dataset.loaded='1';
  try{
    const items=await titanUtils.fetchTitanFeed(name,5);
    if(!items.length){container.innerHTML='<div class="fp-loading">뉴스를 찾을 수 없습니다</div>';return;}
    container.innerHTML=items.map(it=>`<div class="fp-item"><a href="${titanUtils.sanitizeUrl(it.link)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
      <div class="fp-item-title">${titanUtils.escapeHtml(it.title)}</div>
      <div class="fp-item-meta"><span>${titanUtils.formatDate(it.pubDate)}</span>${it.author?'<span>'+titanUtils.escapeHtml(it.author)+'</span>':''}</div>
    </a></div>`).join('');
  }catch(e){container.innerHTML='<div class="fp-loading">피드 로드 실패</div>';}
}

renderTable();
