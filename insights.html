<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Titan Tracker — Cross-Titan Insights</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0b10;--surface:#12141d;--surface2:#1a1d2a;--surface3:#232738;
  --border:rgba(255,255,255,0.06);--border-hover:rgba(255,255,255,0.14);
  --text:#e8e8ed;--text-sub:#8b8fa3;--text-muted:#4a4e62;
  --accent:#6366f1;--accent-light:#818cf8;--accent-glow:rgba(99,102,241,0.25);
  --gold:#f59e0b;--gold-glow:rgba(245,158,11,0.2);
  --green:#22c55e;--red:#ef4444;--blue:#0ea5e9;--purple:#a855f7;
  --radius:20px;--radius-sm:14px;--radius-xs:8px;
}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{text-decoration:none;color:var(--accent-light)}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes barGrow{from{width:0}to{width:var(--target-w)}}

/* 배경 glow — index.html과 동일 */
.bg-glow{position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:800px;height:600px;
  background:radial-gradient(ellipse,var(--accent-glow) 0%,transparent 70%);pointer-events:none;z-index:0;opacity:.5}
.bg-glow2{position:fixed;top:300px;right:-200px;width:500px;height:500px;
  background:radial-gradient(ellipse,var(--gold-glow) 0%,transparent 70%);pointer-events:none;z-index:0;opacity:.3}

/* 백 링크 */
.back-link{position:fixed;top:1rem;left:1rem;font-size:12px;color:var(--text-muted);z-index:10;
  padding:6px 14px;border-radius:20px;background:var(--surface);border:1px solid var(--border);
  transition:all .25s;backdrop-filter:blur(8px)}
.back-link:hover{border-color:var(--accent);color:var(--accent-light);
  box-shadow:0 0 16px rgba(99,102,241,.15)}

/* 히어로 헤더 — index.html 스타일 매칭 */
.header{position:relative;z-index:1;text-align:center;padding:4.5rem 1.5rem 2.5rem}
.header h1{font-size:clamp(28px,5vw,40px);font-weight:900;letter-spacing:-.04em;line-height:1.1;
  background:linear-gradient(135deg,#e8e8ed 20%,var(--gold) 50%,var(--accent-light) 80%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header p{font-size:14px;color:var(--text-sub);margin-top:10px;line-height:1.6;max-width:480px;margin-left:auto;margin-right:auto}
.header .active-titans{margin-top:16px;display:flex;justify-content:center;gap:10px}
.titan-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:500;
  padding:6px 14px;border-radius:20px;background:var(--surface);border:1px solid var(--border);
  transition:border-color .2s}
.titan-badge:hover{border-color:var(--border-hover)}
.titan-badge .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* 메인 컨테이너 */
.main{max-width:960px;margin:0 auto;padding:0 1.5rem 2rem;position:relative;z-index:1}

/* 로딩 */
.loading-full{text-align:center;padding:6rem 2rem;color:var(--text-muted)}
.loading-full .spinner{width:36px;height:36px;border:2px solid var(--surface3);border-top-color:var(--accent);
  border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
.loading-full .step{font-size:11px;margin-top:8px;font-family:'JetBrains Mono',monospace;color:var(--text-muted)}

/* 통계 카드 그리드 */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:2.5rem}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:1.25rem 1rem;text-align:center;transition:all .3s;animation:fadeUp .4s ease both}
.stat-card:nth-child(1){animation-delay:.05s}
.stat-card:nth-child(2){animation-delay:.1s}
.stat-card:nth-child(3){animation-delay:.15s}
.stat-card:nth-child(4){animation-delay:.2s}
.stat-card:hover{border-color:var(--border-hover);transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(0,0,0,.3)}
.stat-val{font-size:28px;font-weight:800;font-family:'JetBrains Mono',monospace;line-height:1}
.stat-label{font-size:10px;color:var(--text-muted);margin-top:6px;letter-spacing:.03em;text-transform:uppercase}

/* 섹션 */
.insight-section{margin-bottom:2.5rem;animation:fadeUp .5s ease both}
.section-label{font-size:15px;font-weight:700;margin-bottom:1.25rem;display:flex;align-items:center;gap:8px;
  letter-spacing:-.02em}
.section-label .icon{font-size:18px}

/* 트렌드 레이더 */
.radar-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:1.5rem 1.75rem;transition:border-color .2s}
.radar-card:hover{border-color:var(--border-hover)}
.radar-bar{display:flex;align-items:center;gap:12px;margin-bottom:8px;padding:4px 0}
.radar-keyword{font-size:12px;font-weight:600;width:130px;text-align:right;flex-shrink:0;
  color:var(--text-sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.radar-track{flex:1;height:26px;background:var(--surface3);border-radius:8px;overflow:hidden;
  display:flex;position:relative}
.radar-fill{height:100%;transition:width .8s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;
  justify-content:flex-end;padding-right:8px;font-size:10px;font-weight:600;color:rgba(255,255,255,.9);
  min-width:2px}
.radar-fill.wolfram{background:linear-gradient(90deg,#6366f1,#818cf8)}
.radar-fill.gates{background:linear-gradient(90deg,#0ea5e9,#38bdf8)}
.radar-count{font-size:11px;color:var(--text-muted);width:36px;text-align:right;
  font-family:'JetBrains Mono',monospace;font-weight:500}
.radar-legend{display:flex;gap:20px;margin-top:16px;justify-content:center;padding-top:12px;
  border-top:1px solid var(--border)}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-sub);font-weight:500}
.legend-dot{width:10px;height:10px;border-radius:3px}

/* 교차 인사이트 카드 */
.cross-grid{display:grid;grid-template-columns:1fr;gap:14px}
.cross-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:1.5rem;transition:all .3s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden}
.cross-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--accent),var(--gold));opacity:0;transition:opacity .3s}
.cross-card:hover{border-color:var(--border-hover);transform:translateY(-3px);
  box-shadow:0 12px 32px rgba(0,0,0,.35)}
.cross-card:hover::before{opacity:1}
.cross-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.cross-keyword{font-size:17px;font-weight:800;
  background:linear-gradient(135deg,var(--accent-light),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.cross-heat{font-size:10px;padding:3px 10px;border-radius:10px;font-weight:600;letter-spacing:.02em}
.heat-hot{background:rgba(239,68,68,.15);color:#fca5a5}
.heat-warm{background:rgba(245,158,11,.15);color:#fcd34d}
.heat-cool{background:rgba(59,130,246,.15);color:#93c5fd}
.cross-quotes{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.quote-card{background:var(--surface2);border-radius:var(--radius-xs);padding:12px 14px;
  border-left:3px solid;transition:background .2s}
.quote-card:hover{background:var(--surface3)}
.quote-card.wolfram{border-color:#6366f1}
.quote-card.gates{border-color:#0ea5e9}
.quote-from{font-size:10px;font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:5px;
  text-transform:uppercase;letter-spacing:.04em;color:var(--text-muted)}
.quote-from .qdot{width:6px;height:6px;border-radius:50%}
.quote-text{font-size:12px;color:var(--text-sub);line-height:1.65;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cross-insight{font-size:12px;color:var(--text);line-height:1.7;padding:12px 14px;
  background:linear-gradient(135deg,rgba(99,102,241,.05),rgba(245,158,11,.05));
  border-radius:var(--radius-xs);border:1px solid rgba(99,102,241,.08)}
.cross-insight strong{color:var(--gold)}

/* 타이탄별 고유 관심사 */
.titan-topics{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.topic-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:1.25rem 1.5rem;transition:all .3s}
.topic-card:hover{border-color:var(--border-hover)}
.topic-card h3{font-size:13px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.topic-card h3 .tdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.topic-list{display:flex;flex-direction:column;gap:4px}
.topic-item{display:flex;justify-content:space-between;align-items:center;font-size:12px;
  padding:8px 12px;border-radius:var(--radius-xs);background:var(--surface2);transition:background .15s}
.topic-item:hover{background:var(--surface3)}
.topic-item .topic-name{color:var(--text-sub)}
.topic-item .topic-count{font-family:'JetBrains Mono',monospace;color:var(--text-muted);font-size:10px;font-weight:500}

/* 종합 인사이트 */
.summary-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:1.75rem;transition:border-color .2s}
.summary-card:hover{border-color:var(--border-hover)}
.summary-row{display:flex;align-items:baseline;gap:10px;padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,.03);font-size:13px;line-height:1.7}
.summary-row:last-child{border-bottom:none}
.summary-emoji{font-size:16px;flex-shrink:0;width:24px;text-align:center}
.summary-text{flex:1;color:var(--text-sub)}
.summary-text strong{font-weight:600}

/* 타임스탬프 */
.timestamp{text-align:center;font-size:11px;color:var(--text-muted);font-family:'JetBrains Mono',monospace;
  margin-top:2.5rem;padding-top:1.25rem;border-top:1px solid var(--border)}

/* 푸터 */
.footer{text-align:center;padding:2rem 1.5rem;font-size:11px;color:var(--text-muted);
  border-top:1px solid var(--border);margin-top:1.5rem;position:relative;z-index:1}

/* 반응형 */
@media(max-width:640px){
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .cross-quotes{grid-template-columns:1fr}
  .titan-topics{grid-template-columns:1fr}
  .radar-keyword{width:90px;font-size:10px}
  .header{padding:3.5rem 1rem 2rem}
}
</style>
</head>
<body>

<!-- 배경 글로우 — index.html과 동일 -->
<div class="bg-glow"></div>
<div class="bg-glow2"></div>

<a href="index.html" class="back-link">← Titan Tracker</a>

<div class="header">
  <h1>🔗 Cross-Titan Insights</h1>
  <p>거인들의 최신 활동을 교차 분석하여 숨겨진 트렌드를 발견합니다</p>
  <div class="active-titans">
    <div class="titan-badge"><div class="dot" style="background:#6366f1"></div>Stephen Wolfram</div>
    <div class="titan-badge"><div class="dot" style="background:#0ea5e9"></div>Bill Gates</div>
  </div>
</div>

<div class="main" id="main-content">
  <div class="loading-full" id="loading">
    <div class="spinner"></div>
    <div>피드 수집 중...</div>
    <div class="step" id="loading-step">Step 1/3: RSS 피드 로딩</div>
  </div>
</div>

<div class="footer">
  Cross-Titan Insights · <a href="index.html">Titan Tracker</a> · Point & Line 🌈
</div>

<script>
const RSS_PROXY = 'https://api.rss2json.com/v1/api.json?rss_url=';

// 두 타이탄의 피드 소스
const TITAN_FEEDS = {
  wolfram: {
    name: 'Stephen Wolfram',
    color: '#6366f1',
    feeds: [
      'https://writings.stephenwolfram.com/feed/',
      'https://blog.wolfram.com/feed/'
    ]
  },
  gates: {
    name: 'Bill Gates',
    color: '#0ea5e9',
    feeds: [
      'https://news.google.com/rss/search?q=site%3Agatesnotes.com&hl=en',
      'https://news.google.com/rss/search?q=Bill+Gates&hl=en&gl=US'
    ]
  }
};

// AI/기술/과학 핵심 키워드 사전 (가중치 포함)
const KEYWORD_MAP = {
  'artificial intelligence':{ display:'AI / 인공지능', weight:3 },
  ' ai ':{ display:'AI / 인공지능', weight:3 },
  ' ai,':{ display:'AI / 인공지능', weight:3 },
  'machine learning':{ display:'Machine Learning', weight:2 },
  'deep learning':{ display:'Deep Learning', weight:2 },
  'neural network':{ display:'Neural Network', weight:2 },
  'large language model':{ display:'LLM', weight:3 },
  'llm':{ display:'LLM', weight:3 },
  'chatgpt':{ display:'ChatGPT / LLM', weight:3 },
  'gpt':{ display:'ChatGPT / LLM', weight:2 },
  'computation':{ display:'Computation / 계산', weight:2 },
  'computational':{ display:'Computation / 계산', weight:2 },
  'education':{ display:'Education / 교육', weight:2 },
  'learning':{ display:'Education / 교육', weight:1 },
  'climate':{ display:'Climate / 기후', weight:3 },
  'energy':{ display:'Energy / 에너지', weight:2 },
  'nuclear':{ display:'Nuclear / 원자력', weight:3 },
  'health':{ display:'Health / 보건', weight:2 },
  'pandemic':{ display:'Pandemic / 팬데믹', weight:3 },
  'vaccine':{ display:'Health / 보건', weight:2 },
  'malaria':{ display:'Health / 보건', weight:2 },
  'science':{ display:'Science / 과학', weight:1 },
  'physics':{ display:'Physics / 물리학', weight:2 },
  'mathematics':{ display:'Mathematics / 수학', weight:2 },
  'math':{ display:'Mathematics / 수학', weight:1 },
  'quantum':{ display:'Quantum / 양자', weight:3 },
  'technology':{ display:'Technology / 기술', weight:1 },
  'innovation':{ display:'Innovation / 혁신', weight:2 },
  'software':{ display:'Software', weight:1 },
  'programming':{ display:'Programming / 프로그래밍', weight:2 },
  'code':{ display:'Programming / 프로그래밍', weight:1 },
  'robot':{ display:'Robotics / 로보틱스', weight:2 },
  'automation':{ display:'Automation / 자동화', weight:2 },
  'data':{ display:'Data / 데이터', weight:1 },
  'book':{ display:'Books / 독서', weight:2 },
  'reading':{ display:'Books / 독서', weight:1 },
  'africa':{ display:'Africa / 아프리카', weight:2 },
  'poverty':{ display:'Poverty / 빈곤', weight:2 },
  'foundation':{ display:'Philanthropy / 자선', weight:1 },
  'invest':{ display:'Investment / 투자', weight:1 },
  'startup':{ display:'Startup / 스타트업', weight:2 },
  'future':{ display:'Future / 미래', weight:1 },
  'brain':{ display:'Neuroscience / 뇌과학', weight:2 },
  'consciousness':{ display:'Consciousness / 의식', weight:3 },
  'agent':{ display:'AI Agent / 에이전트', weight:3 },
  'reasoning':{ display:'Reasoning / 추론', weight:3 },
  'wolfram':{ display:'Wolfram / 계산과학', weight:2 },
  'mathematica':{ display:'Wolfram / 계산과학', weight:2 },
};

function stripHtml(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  return tmp.textContent || tmp.innerText || '';
}

// 피드에서 키워드 추출
function extractKeywords(items) {
  const counts = {};
  const examples = {};
  items.forEach(item => {
    const text = (item.title + ' ' + stripHtml(item.description || item.content || '')).toLowerCase();
    const matched = new Set();
    for (const [keyword, info] of Object.entries(KEYWORD_MAP)) {
      if (text.includes(keyword) && !matched.has(info.display)) {
        matched.add(info.display);
        counts[info.display] = (counts[info.display] || 0) + info.weight;
        if (!examples[info.display]) examples[info.display] = item.title;
      }
    }
  });
  return { counts, examples };
}

// 피드 로드
async function loadFeeds(urls) {
  const allItems = [];
  for (const url of urls) {
    try {
      const res = await fetch(RSS_PROXY + encodeURIComponent(url));
      const data = await res.json();
      if (data.status === 'ok' && data.items) allItems.push(...data.items);
    } catch(e) {}
  }
  return allItems;
}

// 메인 분석
async function analyze() {
  const step = document.getElementById('loading-step');

  // Step 1: 피드 수집
  step.textContent = 'Step 1/3: Wolfram 피드 수집 중...';
  const wolframItems = await loadFeeds(TITAN_FEEDS.wolfram.feeds);

  step.textContent = 'Step 2/3: Gates 피드 수집 중...';
  const gatesItems = await loadFeeds(TITAN_FEEDS.gates.feeds);

  step.textContent = 'Step 3/3: 교차 분석 중...';
  await new Promise(r => setTimeout(r, 500));

  // 키워드 추출
  const wolfram = extractKeywords(wolframItems);
  const gates = extractKeywords(gatesItems);

  // 교차 키워드 찾기
  const allKeywords = new Set([...Object.keys(wolfram.counts), ...Object.keys(gates.counts)]);
  const crossKeywords = [];
  const wolframOnly = [];
  const gatesOnly = [];

  allKeywords.forEach(kw => {
    const wCount = wolfram.counts[kw] || 0;
    const gCount = gates.counts[kw] || 0;
    const total = wCount + gCount;
    if (wCount > 0 && gCount > 0) {
      crossKeywords.push({ keyword: kw, wolfram: wCount, gates: gCount, total, wExample: wolfram.examples[kw], gExample: gates.examples[kw] });
    } else if (wCount > 0) {
      wolframOnly.push({ keyword: kw, count: wCount });
    } else {
      gatesOnly.push({ keyword: kw, count: gCount });
    }
  });

  crossKeywords.sort((a, b) => b.total - a.total);
  wolframOnly.sort((a, b) => b.count - a.count);
  gatesOnly.sort((a, b) => b.count - a.count);

  // 렌더링
  renderResults(crossKeywords, wolframOnly, gatesOnly, wolframItems.length, gatesItems.length);
}

function getHeatLevel(total) {
  if (total >= 8) return { label: 'HOT 🔥', cls: 'heat-hot' };
  if (total >= 4) return { label: 'WARM', cls: 'heat-warm' };
  return { label: 'COOL', cls: 'heat-cool' };
}

function renderResults(cross, wOnly, gOnly, wTotal, gTotal) {
  const main = document.getElementById('main-content');
  const maxScore = cross.length > 0 ? cross[0].total : 1;

  // 인사이트 요약 생성
  const topCross = cross.slice(0, 3).map(c => c.keyword).join(', ');
  const wFocus = wOnly.slice(0, 2).map(w => w.keyword).join(', ');
  const gFocus = gOnly.slice(0, 2).map(g => g.keyword).join(', ');

  main.innerHTML = `
    <!-- 요약 통계 -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-val" style="background:linear-gradient(135deg,var(--gold),#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent">${cross.length}</div>
        <div class="stat-label">교차 키워드</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" style="background:linear-gradient(135deg,#6366f1,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent">${wTotal}</div>
        <div class="stat-label">Wolfram 글</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" style="background:linear-gradient(135deg,#0ea5e9,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent">${gTotal}</div>
        <div class="stat-label">Gates 글</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" style="background:linear-gradient(135deg,var(--green),#4ade80);-webkit-background-clip:text;-webkit-text-fill-color:transparent">${wTotal + gTotal}</div>
        <div class="stat-label">총 분석 글</div>
      </div>
    </div>

    <!-- Trend Radar -->
    <div class="insight-section" style="animation-delay:.1s">
      <div class="section-label"><span class="icon">📊</span> Trend Radar</div>
      <div class="radar-card">
        ${cross.slice(0, 10).map((c, i) => `
          <div class="radar-bar" style="animation:fadeUp .4s ease ${i * .04}s both">
            <div class="radar-keyword">${c.keyword}</div>
            <div class="radar-track">
              <div class="radar-fill wolfram" style="width:${(c.wolfram / maxScore) * 50}%">${c.wolfram > 1 ? c.wolfram : ''}</div>
              <div class="radar-fill gates" style="width:${(c.gates / maxScore) * 50}%">${c.gates > 1 ? c.gates : ''}</div>
            </div>
            <div class="radar-count">${c.total}</div>
          </div>
        `).join('')}
        <div class="radar-legend">
          <div class="legend-item"><div class="legend-dot" style="background:linear-gradient(135deg,#6366f1,#818cf8)"></div>Wolfram</div>
          <div class="legend-item"><div class="legend-dot" style="background:linear-gradient(135deg,#0ea5e9,#38bdf8)"></div>Gates</div>
        </div>
      </div>
    </div>

    <!-- 교차 인사이트 카드 -->
    <div class="insight-section" style="animation-delay:.2s">
      <div class="section-label"><span class="icon">🔗</span> Cross-Titan Insights</div>
      <div class="cross-grid">
      ${cross.slice(0, 5).map((c, i) => {
        const heat = getHeatLevel(c.total);
        return `
        <div class="cross-card" style="animation:fadeUp .4s ease ${i * .06}s both">
          <div class="cross-header">
            <span class="cross-keyword">${c.keyword}</span>
            <span class="cross-heat ${heat.cls}">${heat.label}</span>
          </div>
          <div class="cross-quotes">
            <div class="quote-card wolfram">
              <div class="quote-from"><div class="qdot" style="background:#6366f1"></div>Wolfram</div>
              <div class="quote-text">${c.wExample || '—'}</div>
            </div>
            <div class="quote-card gates">
              <div class="quote-from"><div class="qdot" style="background:#0ea5e9"></div>Gates</div>
              <div class="quote-text">${c.gExample || '—'}</div>
            </div>
          </div>
          <div class="cross-insight">
            💡 두 거인 모두 <strong>${c.keyword}</strong>에 주목 중 (Wolfram ${c.wolfram}회, Gates ${c.gates}회 언급).
            ${c.wolfram > c.gates ? 'Wolfram이 더 깊이 다루고 있으며, 기술적/이론적 관점에서 접근.' :
              c.gates > c.wolfram ? 'Gates가 더 자주 언급하며, 실용적/글로벌 관점에서 접근.' :
              '양쪽 모두 비슷한 수준으로 다루고 있어 현재 가장 주목할 교차 트렌드.'}
          </div>
        </div>`;
      }).join('')}
      </div>
    </div>

    <!-- 타이탄별 고유 관심사 -->
    <div class="insight-section" style="animation-delay:.3s">
      <div class="section-label"><span class="icon">🎯</span> 타이탄별 고유 관심사</div>
      <div class="titan-topics">
        <div class="topic-card" style="animation:fadeUp .4s ease .1s both">
          <h3><div class="tdot" style="background:#6366f1"></div>Wolfram Only</h3>
          <div class="topic-list">
            ${wOnly.slice(0, 6).map(w => `
              <div class="topic-item">
                <span class="topic-name">${w.keyword}</span>
                <span class="topic-count">${w.count}회</span>
              </div>
            `).join('') || '<div style="font-size:11px;color:var(--text-muted);padding:8px">교차되지 않은 고유 키워드 없음</div>'}
          </div>
        </div>
        <div class="topic-card" style="animation:fadeUp .4s ease .15s both">
          <h3><div class="tdot" style="background:#0ea5e9"></div>Gates Only</h3>
          <div class="topic-list">
            ${gOnly.slice(0, 6).map(g => `
              <div class="topic-item">
                <span class="topic-name">${g.keyword}</span>
                <span class="topic-count">${g.count}회</span>
              </div>
            `).join('') || '<div style="font-size:11px;color:var(--text-muted);padding:8px">교차되지 않은 고유 키워드 없음</div>'}
          </div>
        </div>
      </div>
    </div>

    <!-- 종합 인사이트 -->
    <div class="insight-section" style="animation-delay:.4s">
      <div class="section-label"><span class="icon">🧠</span> 종합 인사이트</div>
      <div class="summary-card">
        <div class="summary-row">
          <span class="summary-emoji">📌</span>
          <div class="summary-text"><strong style="color:var(--gold)">공통 관심사</strong> — ${topCross || '분석 중...'}</div>
        </div>
        <div class="summary-row">
          <span class="summary-emoji">🔵</span>
          <div class="summary-text"><strong style="color:#818cf8">Wolfram 고유</strong> — ${wFocus || '없음'} · 이론적·수학적 접근</div>
        </div>
        <div class="summary-row">
          <span class="summary-emoji">🟦</span>
          <div class="summary-text"><strong style="color:#38bdf8">Gates 고유</strong> — ${gFocus || '없음'} · 실용적·글로벌 접근</div>
        </div>
        <div class="summary-row" style="border-top:1px solid rgba(255,255,255,.04);margin-top:4px;padding-top:14px">
          <span class="summary-emoji">💡</span>
          <div class="summary-text" style="color:var(--text)">
            <strong style="color:var(--green)">핵심 발견</strong> —
            ${cross.length > 0 ?
              `두 거인의 최대 교차점은 <strong style="color:var(--gold)">${cross[0].keyword}</strong>입니다.
              Wolfram은 기술의 원리와 구조에 집중하는 반면, Gates는 기술의 사회적 영향과 활용에 집중합니다.
              ${cross.length >= 2 ? '두 번째 교차점인 <strong style="color:var(--gold)">' + cross[1].keyword + '</strong>도 주목할 만합니다.' : ''}` :
              '현재 수집된 피드에서 교차점을 분석 중입니다.'}
          </div>
        </div>
      </div>
    </div>

    <div class="timestamp">
      분석 시각: ${new Date().toLocaleString('ko-KR')} · Wolfram ${wTotal}개 + Gates ${gTotal}개 피드 기반
    </div>
  `;
}

// 실행
analyze();
</script>
</body>
</html>
