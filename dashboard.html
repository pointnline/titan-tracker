<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Titan Tracker — Insight Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js" crossorigin="anonymous"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0b10;--surface:#12141d;--surface2:#1a1d2a;--surface3:#232738;
  --border:rgba(255,255,255,0.06);--border-hover:rgba(255,255,255,0.14);
  --text:#e8e8ed;--text-sub:#8b8fa3;--text-muted:#4a4e62;
  --accent:#6366f1;--accent-light:#818cf8;
  --gold:#f59e0b;--green:#22c55e;--red:#ef4444;--blue:#0ea5e9;--purple:#a855f7;--pink:#ec4899;
  --radius:16px;--radius-sm:12px;--radius-xs:8px;
}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;padding-top:44px}
a{text-decoration:none;color:var(--accent-light)}
.back-link{position:fixed;top:1rem;left:1rem;font-size:12px;color:var(--text-muted);z-index:10;
  padding:6px 12px;border-radius:20px;background:var(--surface);border:1px solid var(--border);transition:all .2s}
.back-link:hover{border-color:var(--accent);color:var(--accent-light)}

/* 헤더 */
.header{padding:2.5rem 1.5rem 1.5rem;text-align:center;
  background:linear-gradient(135deg,rgba(99,102,241,0.1),rgba(245,158,11,0.06));border-bottom:1px solid var(--border)}
.header h1{font-size:24px;font-weight:900;letter-spacing:-0.04em;
  background:linear-gradient(135deg,#e8e8ed 20%,var(--gold) 60%,var(--accent-light));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header p{font-size:12px;color:var(--text-muted);margin-top:6px}

/* 그리드 레이아웃 */
.dashboard{max-width:1200px;margin:0 auto;padding:1.5rem;
  display:grid;grid-template-columns:1fr 1fr;gap:14px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:1.25rem;position:relative;overflow:hidden}
.card.full{grid-column:1/-1}
.card-title{font-size:12px;font-weight:700;color:var(--text-sub);margin-bottom:12px;
  display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:0.05em}
.card-title .emoji{font-size:14px}

/* 숫자 카드 */
.stats-row{grid-column:1/-1;display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:1rem;text-align:center}
.stat-val{font-size:28px;font-weight:900;font-family:'JetBrains Mono',monospace}
.stat-label{font-size:10px;color:var(--text-muted);margin-top:4px;letter-spacing:0.03em}

/* 인사이트 펀치 */
.punch-list{display:flex;flex-direction:column;gap:8px}
.punch{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;
  background:var(--surface2);border-radius:var(--radius-xs);border-left:3px solid var(--gold)}
.punch-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.punch-text{font-size:12px;color:var(--text-sub);line-height:1.6}
.punch-text strong{color:var(--text);font-weight:600}
.punch-text .highlight{color:var(--gold);font-weight:700}

/* 히트맵 */
.heatmap{display:grid;gap:2px}
.heatmap-row{display:flex;gap:2px;align-items:center}
.heatmap-label{font-size:10px;color:var(--text-sub);width:100px;text-align:right;padding-right:8px;
  flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.heatmap-cell{height:28px;border-radius:4px;flex:1;display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:600;color:rgba(255,255,255,0.7);transition:all .2s;cursor:default;min-width:0}
.heatmap-cell:hover{transform:scale(1.05);z-index:1}
.heatmap-header{display:flex;gap:2px;margin-bottom:4px;padding-left:108px}
.heatmap-header span{flex:1;text-align:center;font-size:9px;color:var(--text-muted);font-weight:600;min-width:0}

/* 버블 */
.bubble-wrap{position:relative;height:280px;display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:6px;padding:10px}
.bubble{border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:700;color:white;cursor:default;transition:all .3s;text-align:center;line-height:1.2;padding:4px}
.bubble:hover{transform:scale(1.15);z-index:1}

/* 차트 캔버스 */
canvas{max-height:250px}

/* 로딩 */
.loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:100;transition:opacity .5s}
.loading-overlay.hide{opacity:0;pointer-events:none}
.loader{width:48px;height:48px;border:3px solid var(--surface3);border-top-color:var(--accent);
  border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{margin-top:16px;font-size:13px;color:var(--text-sub)}
.loading-step{font-size:11px;color:var(--text-muted);margin-top:6px;font-family:'JetBrains Mono',monospace}

.footer{text-align:center;padding:1.5rem;font-size:10px;color:var(--text-muted);border-top:1px solid var(--border)}

[data-theme="light"]{
  --bg:#f5f5f7;--surface:#ffffff;--surface2:#f0f0f3;--surface3:#e8e8ec;
  --border:rgba(0,0,0,0.08);--border-hover:rgba(0,0,0,0.15);
  --text:#1a1a2e;--text-sub:#4a4a6a;--text-muted:#8888a0;
}
.theme-toggle{position:fixed;top:1rem;right:1rem;z-index:50;width:36px;height:36px;border-radius:50%;
  border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .3s;
  box-shadow:0 2px 8px rgba(0,0,0,0.1)}
.theme-toggle:hover{border-color:var(--accent);transform:scale(1.1)}
[data-theme="light"] .loading-overlay{background:var(--bg)}

@media(max-width:768px){
  .dashboard{grid-template-columns:1fr}
  .stats-row{grid-template-columns:repeat(3,1fr)}
  .card.full{grid-column:1}
  .heatmap-label{width:70px;font-size:9px}
}
@media(max-width:480px){
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .dashboard{padding:1rem}
}
</style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()" title="라이트/다크 모드 전환">🌙</button>

<div class="loading-overlay" id="loader">
  <div class="loader"></div>
  <div class="loading-text">Insight Dashboard 생성 중</div>
  <div class="loading-step" id="load-step">피드 수집 중...</div>
</div>

<nav class="titan-nav" style="position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;gap:0;padding:0 1rem;height:40px;background:rgba(10,11,16,0.85);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.06);font-size:11px"><a href="index.html" style="color:#8b8fa3;font-weight:600;margin-right:auto;text-decoration:none">🔭 Titan Tracker</a><a href="insights.html" style="color:#5a5e72;padding:4px 10px;text-decoration:none" onmouseover="this.style.color='#818cf8'" onmouseout="this.style.color='#5a5e72'">📝 Insights</a><a href="dashboard.html" style="color:#818cf8;padding:4px 10px;text-decoration:none">📊 Dashboard</a><a href="study.html" style="color:#5a5e72;padding:4px 10px;text-decoration:none" onmouseover="this.style.color='#818cf8'" onmouseout="this.style.color='#5a5e72'">🧠 Study</a></nav>

<div class="header">
  <h1>⚡ Insight Dashboard</h1>
  <p>거인들의 최신 활동 교차 분석 · 실시간 트렌드 시각화</p>
</div>

<!-- 숫자 요약 -->
<div class="dashboard">
  <div class="stats-row" id="stats-row"></div>

  <!-- 히트맵: 타이탄 × 토픽 -->
  <div class="card full">
    <div class="card-title"><span class="emoji">🗺️</span> Titan × Topic 히트맵</div>
    <div id="heatmap"></div>
  </div>

  <!-- 교차 버블 -->
  <div class="card">
    <div class="card-title"><span class="emoji">🫧</span> 교차 키워드 버블</div>
    <div class="bubble-wrap" id="bubbles"></div>
  </div>

  <!-- 인사이트 펀치 -->
  <div class="card">
    <div class="card-title"><span class="emoji">💡</span> Key Insights</div>
    <div class="punch-list" id="punches"></div>
  </div>

  <!-- 레이더 차트 -->
  <div class="card">
    <div class="card-title"><span class="emoji">🕸️</span> 관심사 레이더</div>
    <canvas id="radarChart"></canvas>
  </div>

  <!-- 도넛 차트 -->
  <div class="card">
    <div class="card-title"><span class="emoji">🍩</span> 토픽 분포</div>
    <canvas id="donutChart"></canvas>
  </div>

  <!-- 타이탄별 막대 -->
  <div class="card full">
    <div class="card-title"><span class="emoji">📊</span> 타이탄별 키워드 비교</div>
    <canvas id="barChart"></canvas>
  </div>
</div>

<div class="footer">
  Insight Dashboard · <a href="index.html">Titan Tracker</a> · <a href="insights.html">상세 리포트 →</a> · Point & Line 🌈
</div>

<script>
// 테마 토글
(function(){
  const saved = localStorage.getItem('titan-theme');
  if(saved) document.documentElement.setAttribute('data-theme', saved);
  else if(window.matchMedia('(prefers-color-scheme: light)').matches) document.documentElement.setAttribute('data-theme','light');
  window.addEventListener('DOMContentLoaded',()=>{
    const btn=document.querySelector('.theme-toggle');
    if(btn) btn.textContent=document.documentElement.getAttribute('data-theme')==='light'?'🌙':'☀️';
  });
})();
function toggleTheme(){
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('titan-theme', next);
  document.querySelector('.theme-toggle').textContent = next === 'light' ? '🌙' : '☀️';
  if(typeof Chart!=='undefined'){Chart.defaults.color=next==='light'?'#4a4a6a':'#8b8fa3';Chart.defaults.borderColor=next==='light'?'rgba(0,0,0,0.06)':'rgba(255,255,255,0.06)';}
}
function escapeHtml(s){if(!s)return'';const d=document.createElement('div');d.appendChild(document.createTextNode(s));return d.innerHTML}
function stripHtml(h){if(!h)return'';const doc=new DOMParser().parseFromString(h,'text/html');return doc.body.textContent||''}

Chart.defaults.color = '#8b8fa3';
Chart.defaults.borderColor = 'rgba(255,255,255,0.06)';
Chart.defaults.font.family = "'Inter',sans-serif";

const RSS_PROXY = 'https://api.rss2json.com/v1/api.json?rss_url=';

const TITANS = {
  wolfram: {
    name: 'Wolfram', color: '#6366f1', colorLight: 'rgba(99,102,241,0.6)',
    feeds: ['https://writings.stephenwolfram.com/feed/', 'https://blog.wolfram.com/feed/']
  },
  gates: {
    name: 'Gates', color: '#0ea5e9', colorLight: 'rgba(14,165,233,0.6)',
    feeds: ['https://news.google.com/rss/search?q=site%3Agatesnotes.com&hl=en',
            'https://news.google.com/rss/search?q=Bill+Gates&hl=en&gl=US']
  },
  musk: {
    name: 'Musk', color: '#a855f7', colorLight: 'rgba(168,85,247,0.6)',
    feeds: ['https://news.google.com/rss/search?q=Tesla+Elon+Musk&hl=en&gl=US',
            'https://news.google.com/rss/search?q=SpaceX+Starship&hl=en&gl=US',
            'https://news.google.com/rss/search?q=xAI+Grok+Elon+Musk&hl=en&gl=US']
  },
  bezos: {
    name: 'Bezos', color: '#f59e0b', colorLight: 'rgba(245,158,11,0.6)',
    feeds: ['https://news.google.com/rss/search?q=Amazon+Jeff+Bezos+AWS&hl=en&gl=US',
            'https://news.google.com/rss/search?q=Blue+Origin+New+Glenn&hl=en&gl=US']
  },
  amodei: {
    name: 'Amodei', color: '#ef4444', colorLight: 'rgba(239,68,68,0.6)',
    feeds: ['https://news.google.com/rss/search?q=Anthropic+Claude+Dario+Amodei&hl=en',
            'https://news.google.com/rss/search?q=Anthropic+AI+safety&hl=en&gl=US']
  },
  dalio: {
    name: 'Dalio', color: '#eab308', colorLight: 'rgba(234,179,8,0.6)',
    feeds: ['https://news.google.com/rss/search?q=%22Ray+Dalio%22+Bridgewater+economy&hl=en',
            'https://news.google.com/rss/search?q=%22Ray+Dalio%22+principles+debt&hl=en']
  },
  altman: {
    name: 'Altman', color: '#10b981', colorLight: 'rgba(16,185,129,0.6)',
    feeds: ['https://news.google.com/rss/search?q=Sam+Altman+OpenAI&hl=en&gl=US',
            'https://news.google.com/rss/search?q=OpenAI+GPT+ChatGPT&hl=en&gl=US']
  },
  huang: {
    name: 'Huang', color: '#84cc16', colorLight: 'rgba(132,204,22,0.6)',
    feeds: ['https://news.google.com/rss/search?q=Jensen+Huang+NVIDIA&hl=en&gl=US',
            'https://news.google.com/rss/search?q=NVIDIA+GPU+AI+infrastructure&hl=en&gl=US']
  },
  nadella: {
    name: 'Nadella', color: '#0078d4', colorLight: 'rgba(0,120,212,0.6)',
    feeds: ['https://news.google.com/rss/search?q=Satya+Nadella+Microsoft&hl=en&gl=US',
            'https://news.google.com/rss/search?q=Microsoft+AI+Copilot+Azure&hl=en&gl=US']
  }
};

const TOPICS = {
  'AI / 인공지능':     { keys: ['artificial intelligence',' ai ','ai,',' ai.','machine learning','deep learning','neural network','llm','chatgpt','gpt-','gpt '], color:'#6366f1' },
  'Education / 교육':  { keys: ['education','learning','student','teacher','school','university','tutor'], color:'#22c55e' },
  'Climate / 기후':    { keys: ['climate','carbon','emission','energy','solar','wind','nuclear','green','net zero','renewable'], color:'#f59e0b' },
  'Health / 보건':     { keys: ['health','disease','vaccine','pandemic','malaria','virus','medical','hospital'], color:'#ec4899' },
  'Computation / 계산':{ keys: ['computation','computational','algorithm','wolfram','mathematica','programming','code','software'], color:'#a855f7' },
  'Science / 과학':    { keys: ['science','physics','quantum','biology','chemistry','research','experiment'], color:'#3b82f6' },
  'Innovation / 혁신': { keys: ['innovation','startup','invest','venture','entrepreneur','disrupt','breakthrough'], color:'#14b8a6' },
  'Books / 독서':      { keys: ['book','reading','author','wrote','memoir','publish'], color:'#f97316' },
  'AI Agent':          { keys: ['agent','reasoning','autonomous','automat'], color:'#ef4444' },
  'Future / 미래':     { keys: ['future','prediction','forecast','trend','next decade','transform'], color:'#8b5cf6' },
  'Tesla / 테슬라':    { keys: ['tesla','model 3','model y','cybertruck','fsd','autopilot','ev','electric vehicle'], color:'#7c3aed' },
  'Space / 우주':      { keys: ['spacex','rocket','starship','launch','orbit','mars','blue origin','new glenn','satellite'], color:'#4f46e5' },
  'AI Safety / 안전':  { keys: ['safety','alignment','constitutional','responsible','guardrail','anthropic','claude'], color:'#dc2626' },
  'Amazon / 클라우드': { keys: ['amazon','aws','cloud','prime','alexa'], color:'#d97706' },
  'Macro / 거시경제':  { keys: ['macro','debt','inflation','interest rate','recession','cycle','federal reserve','gdp','economy'], color:'#ca8a04' },
  'Principles / 원칙': { keys: ['principles','bridgewater','hedge fund','ray dalio','meritocracy'], color:'#a16207' },
  'Geopolitics / 지정학':{ keys: ['geopolit','china','tariff','trade war','sanction','conflict'], color:'#b45309' },
};

async function loadFeeds(urls){
  const items=[];
  for(const u of urls){try{const r=await fetch(RSS_PROXY+encodeURIComponent(u));const d=await r.json();
    if(d.status==='ok'&&d.items)items.push(...d.items);}catch(e){}}
  return items;
}

function scoreTitan(items){
  const scores={};
  items.forEach(item=>{
    const text=(item.title+' '+stripHtml(item.description||item.content||'')).toLowerCase();
    for(const[topic,{keys}]of Object.entries(TOPICS)){
      for(const k of keys){
        if(text.includes(k)){scores[topic]=(scores[topic]||0)+1;break;}
      }
    }
  });
  return scores;
}

function setStep(t){document.getElementById('load-step').textContent=t}

async function run(){
  const titanKeys = Object.keys(TITANS);
  const allItems = {};
  const allScores = {};

  // 동적 피드 수집
  for (let i = 0; i < titanKeys.length; i++) {
    const key = titanKeys[i];
    setStep(TITANS[key].name + ' 피드 수집 중... (' + (i+1) + '/' + titanKeys.length + ')');
    allItems[key] = await loadFeeds(TITANS[key].feeds);
    allScores[key] = scoreTitan(allItems[key]);
  }
  setStep('교차 분석 중...');

  const topicNames = Object.keys(TOPICS);

  // 교차 토픽: 2명 이상 언급
  const crossTopics = topicNames.filter(t => {
    let count = 0;
    titanKeys.forEach(k => { if ((allScores[k][t] || 0) > 0) count++; });
    return count >= 2;
  });

  const totalMentions = topicNames.reduce((s, t) => {
    titanKeys.forEach(k => { s += (allScores[k][t] || 0); });
    return s;
  }, 0);

  const totalArticles = titanKeys.reduce((s, k) => s + allItems[k].length, 0);

  // === 렌더링 ===

  // 1. 숫자 카드
  document.getElementById('stats-row').innerHTML = [
    {v: titanKeys.length, l: 'Active Titans', c: 'var(--accent-light)'},
    {v: totalArticles, l: '분석된 글', c: 'var(--green)'},
    {v: crossTopics.length, l: '교차 토픽', c: 'var(--gold)'},
    {v: totalMentions, l: '키워드 감지', c: 'var(--purple)'},
    {v: topicNames.length, l: '추적 토픽', c: 'var(--blue)'},
  ].map(s => '<div class="stat-card"><div class="stat-val" style="color:' + s.c + '">' + s.v + '</div><div class="stat-label">' + s.l + '</div></div>').join('');

  // 2. 히트맵
  const maxScore = Math.max(...topicNames.map(t => Math.max(...titanKeys.map(k => allScores[k][t] || 0))), 1);
  let hmHtml = '<div class="heatmap-header">' + titanKeys.map(k => '<span>' + TITANS[k].name + '</span>').join('') + '</div>';
  topicNames.filter(t => {
    let sum = 0;
    titanKeys.forEach(k => { sum += (allScores[k][t] || 0); });
    return sum > 0;
  }).sort((a, b) => {
    let sa = 0, sb = 0;
    titanKeys.forEach(k => { sa += (allScores[k][a] || 0); sb += (allScores[k][b] || 0); });
    return sb - sa;
  }).forEach(topic => {
    hmHtml += '<div class="heatmap-row"><div class="heatmap-label">' + topic + '</div>';
    titanKeys.forEach(k => {
      const v = allScores[k][topic] || 0;
      const intensity = v / maxScore;
      const bg = intensity > 0 ? TITANS[k].color : 'var(--surface3)';
      const opacity = Math.max(0.15, intensity);
      hmHtml += '<div class="heatmap-cell" style="background:' + bg + ';opacity:' + opacity + '" title="' + TITANS[k].name + ': ' + v + '회">' + (v || '') + '</div>';
    });
    hmHtml += '</div>';
  });
  document.getElementById('heatmap').innerHTML = '<div class="heatmap">' + hmHtml + '</div>';

  // 3. 버블
  const bubbleData = topicNames.map(t => {
    let total = 0, mentionCount = 0;
    titanKeys.forEach(k => {
      const v = allScores[k][t] || 0;
      total += v;
      if (v > 0) mentionCount++;
    });
    return { topic: t, total, color: TOPICS[t].color, cross: mentionCount >= 2 };
  }).filter(b => b.total > 0).sort((a, b) => b.total - a.total);
  const maxBubble = bubbleData[0]?.total || 1;
  document.getElementById('bubbles').innerHTML = bubbleData.map(b => {
    const size = Math.max(40, Math.min(100, (b.total / maxBubble) * 100));
    const border = b.cross ? 'border:2px solid var(--gold)' : '';
    return '<div class="bubble" style="width:' + size + 'px;height:' + size + 'px;background:' + b.color + ';' + border + '" title="' + b.topic + ': ' + b.total + '회' + (b.cross ? ' (교차!)' : '') + '">' + b.topic.split('/')[0].trim() + '</div>';
  }).join('');

  // 4. 인사이트 펀치
  const punches = [];
  if (crossTopics.length > 0) {
    const top = crossTopics.slice().sort((a, b) => {
      let sa = 0, sb = 0;
      titanKeys.forEach(k => { sa += (allScores[k][a] || 0); sb += (allScores[k][b] || 0); });
      return sb - sa;
    });
    punches.push({icon: '🔥', text: '최대 교차점: <span class="highlight">' + top[0] + '</span> — ' + titanKeys.length + '명 중 다수가 집중'});
    if (top.length >= 2) punches.push({icon: '⚡', text: '2위 교차: <span class="highlight">' + top[1] + '</span> — 공통 관심 급상승'});
  }
  // 각 타이탄의 #1 관심사
  titanKeys.forEach(k => {
    const sorted = topicNames.slice().sort((a, b) => (allScores[k][b] || 0) - (allScores[k][a] || 0));
    const topTopic = sorted[0];
    const topCount = allScores[k][topTopic] || 0;
    if (topCount > 0) {
      punches.push({icon: '●', text: '<strong style="color:' + TITANS[k].color + '">' + TITANS[k].name + '</strong> 최대 관심: <strong>' + topTopic + '</strong> (' + topCount + '회)'});
    }
  });
  document.getElementById('punches').innerHTML = punches.map(p => '<div class="punch"><span class="punch-icon">' + p.icon + '</span><div class="punch-text">' + p.text + '</div></div>').join('');

  // 5. 레이더 차트
  const radarTopics = topicNames.filter(t => {
    let sum = 0;
    titanKeys.forEach(k => { sum += (allScores[k][t] || 0); });
    return sum > 0;
  }).slice(0, 8);
  new Chart(document.getElementById('radarChart'), {
    type: 'radar',
    data: {
      labels: radarTopics.map(t => t.split('/')[0].trim()),
      datasets: titanKeys.map(k => ({
        label: TITANS[k].name,
        data: radarTopics.map(t => allScores[k][t] || 0),
        backgroundColor: TITANS[k].colorLight.replace('0.6', '0.1'),
        borderColor: TITANS[k].color,
        borderWidth: 2,
        pointBackgroundColor: TITANS[k].color
      }))
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: { r: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { display: false }, pointLabels: { font: { size: 9 } } } },
      plugins: { legend: { labels: { boxWidth: 8, font: { size: 9 } } } }
    }
  });

  // 6. 도넛 차트 (전체 토픽 분포)
  const donutData = topicNames.map(t => {
    let total = 0;
    titanKeys.forEach(k => { total += (allScores[k][t] || 0); });
    return { topic: t, total, color: TOPICS[t].color };
  }).filter(d => d.total > 0).sort((a, b) => b.total - a.total);
  new Chart(document.getElementById('donutChart'), {
    type: 'doughnut',
    data: {
      labels: donutData.map(d => d.topic.split('/')[0].trim()),
      datasets: [{ data: donutData.map(d => d.total), backgroundColor: donutData.map(d => d.color), borderWidth: 0 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '60%',
      plugins: { legend: { position: 'right', labels: { boxWidth: 8, font: { size: 9 }, padding: 6 } } }
    }
  });

  // 7. 막대 차트
  const barTopics = topicNames.filter(t => {
    let sum = 0;
    titanKeys.forEach(k => { sum += (allScores[k][t] || 0); });
    return sum > 0;
  }).sort((a, b) => {
    let sa = 0, sb = 0;
    titanKeys.forEach(k => { sa += (allScores[k][a] || 0); sb += (allScores[k][b] || 0); });
    return sb - sa;
  }).slice(0, 8);
  new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: {
      labels: barTopics.map(t => t.split('/')[0].trim()),
      datasets: titanKeys.map(k => ({
        label: TITANS[k].name,
        data: barTopics.map(t => allScores[k][t] || 0),
        backgroundColor: TITANS[k].colorLight,
        borderRadius: 4
      }))
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: { x: { grid: { display: false } }, y: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { font: { size: 10 } } } },
      plugins: { legend: { labels: { boxWidth: 8, font: { size: 9 } } } }
    }
  });

  // 로딩 해제
  setTimeout(() => document.getElementById('loader').classList.add('hide'), 300);
}

run();
</script>
</body>
</html>
