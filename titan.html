<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">Titan Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#232736;--surface3:#2a2e3d;--border:rgba(255,255,255,0.06);--border-hover:rgba(255,255,255,0.12);--text:#e8e8ed;--text-sub:#8b8fa3;--text-muted:#5a5e72;--accent:#6366f1;--accent-light:#818cf8;--accent-bg:rgba(99,102,241,0.1);--red:#ef4444;--orange:#f97316;--green:#22c55e;--blue:#3b82f6;--purple:#a855f7;--radius:16px;--radius-sm:12px;--radius-xs:8px}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;padding-top:44px}
a{color:var(--accent-light);text-decoration:none;transition:color .2s}a:hover{color:#c7d2fe}
.header{background:linear-gradient(135deg,rgba(99,102,241,0.12),rgba(168,85,247,0.06));border-bottom:1px solid var(--border);padding:2rem 1.5rem}
.header-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap}
.avatar{width:80px;height:80px;border-radius:50%;border:3px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:32px;color:white;font-weight:700;flex-shrink:0}
.header-info h1{font-size:24px;font-weight:700;letter-spacing:-0.03em}
.header-info .subtitle{font-size:13px;color:var(--text-sub);margin-top:4px;line-height:1.6}
.header-info .subtitle span{color:var(--accent-light);font-weight:500}
.header-badges{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.badge{font-size:11px;padding:4px 10px;border-radius:20px;font-weight:500;border:1px solid rgba(99,102,241,0.3);background:rgba(99,102,241,0.1);color:var(--accent-light)}
.tabs-wrap{max-width:1100px;margin:0 auto;padding:0 1.5rem}
.tabs{display:flex;gap:4px;padding:1rem 0 0;border-bottom:1px solid var(--border);overflow-x:auto}
.tab{padding:10px 18px;font-size:13px;font-weight:500;color:var(--text-sub);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;border-radius:var(--radius-xs) var(--radius-xs) 0 0}
.tab:hover{color:var(--text);background:rgba(255,255,255,0.03)}
.tab.active{color:var(--accent-light);border-bottom-color:var(--accent);background:var(--accent-bg)}
.main{max-width:1100px;margin:0 auto;padding:1.5rem}
.tab-content{display:none}.tab-content.active{display:block}

/* Feed */
.feed-section{margin-bottom:2rem}.feed-title{font-size:15px;font-weight:600;margin-bottom:1rem;display:flex;align-items:center;gap:8px;cursor:pointer;padding:12px 0;transition:background .15s;border-radius:8px}
.feed-title:hover{background:rgba(255,255,255,0.03)}
.feed-title .dot{width:8px;height:8px;border-radius:50%}.feed-title::after{content:'▸';float:right;font-size:10px;color:var(--text-muted);transition:transform .25s;margin-top:3px}
.feed-section.expanded .feed-title::after{transform:rotate(90deg)}
.feed-list{display:none;flex-direction:column;gap:10px;animation:feedSlide .3s ease}
.feed-section.expanded .feed-list{display:flex}
@keyframes feedSlide{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.feed-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:1.25rem;transition:all .2s}
.feed-item:hover{border-color:var(--border-hover);background:var(--surface2)}
.feed-item a{display:block;color:var(--text)}
.feed-item-title{font-size:14px;font-weight:600;line-height:1.5;margin-bottom:4px}
.feed-item-meta{font-size:11px;color:var(--text-muted);font-family:'JetBrains Mono',monospace;display:flex;gap:12px;margin-top:6px}
.feed-item-desc{font-size:12px;color:var(--text-sub);line-height:1.6;margin-top:8px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.feed-source{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:500;background:var(--accent-bg);color:var(--accent-light)}

/* Profile */
.profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.profile-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:1.25rem}
.profile-card h3{font-size:13px;font-weight:600;margin-bottom:10px;color:var(--accent-light)}
.profile-card p,.profile-card li{font-size:12px;color:var(--text-sub);line-height:1.8}
.profile-card ul{list-style:none;padding:0}
.profile-card ul li::before{content:'→ ';color:var(--accent)}
.signal-box{margin-top:12px;padding:10px 14px;border-radius:var(--radius-xs);background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.15);font-size:11px;color:#fbbf24;display:flex;align-items:center;gap:6px}
.ai-gen-btn{margin-top:1rem;padding:10px 20px;border-radius:var(--radius-xs);border:none;background:linear-gradient(135deg,#6366f1,#a855f7);color:white;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;display:flex;align-items:center;gap:6px}
.ai-gen-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(99,102,241,0.3)}
.ai-gen-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}

/* Loading */
.loading{text-align:center;padding:3rem;color:var(--text-muted)}
.loading .spinner{width:32px;height:32px;border:3px solid var(--surface3);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-msg{text-align:center;padding:2rem;color:var(--red);font-size:13px;background:rgba(239,68,68,0.08);border-radius:var(--radius-sm)}
.refresh-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.refresh-btn{font-size:12px;padding:6px 14px;border-radius:var(--radius-xs);border:1px solid var(--border);background:var(--surface);color:var(--text-sub);cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif}.refresh-btn:hover{border-color:var(--accent);color:var(--accent-light)}
.last-updated{font-size:11px;color:var(--text-muted);font-family:'JetBrains Mono',monospace}
.footer{text-align:center;padding:2rem;font-size:11px;color:var(--text-muted);border-top:1px solid var(--border);margin-top:2rem}
@media(max-width:768px){.header-inner{flex-direction:column;text-align:center}.header-badges{justify-content:center}.profile-grid{grid-template-columns:1fr}.tabs{gap:0}.tab{padding:10px 12px;font-size:12px}}
</style>
</head>
<body>
<script src="titans-data.js"></script>
<script src="titan-nav.js"></script>
<script src="config.js"></script>

<div class="header" id="titan-header">
  <div class="header-inner">
    <div class="avatar" id="titan-avatar">?</div>
    <div class="header-info">
      <h1 id="titan-name">Loading...</h1>
      <div class="subtitle" id="titan-role"></div>
      <div class="header-badges" id="titan-badges"></div>
    </div>
  </div>
</div>

<div class="tabs-wrap"><div class="tabs">
  <div class="tab active" data-tab="feed" onclick="switchTab('feed')">📡 피드</div>
  <div class="tab" data-tab="profile" onclick="switchTab('profile')">🧬 프로필</div>
</div></div>

<div class="main">
  <div class="tab-content active" id="tab-feed">
    <div class="refresh-bar"><span class="last-updated" id="last-updated">마지막 업데이트: —</span><button class="refresh-btn" onclick="loadAllFeeds()">↻ 새로고침</button></div>
    <div id="feed-sections"></div>
  </div>

  <div class="tab-content" id="tab-profile">
    <div id="profile-content">
      
    </div>
  </div>
</div>

<div class="footer">
  <span id="titan-footer-name"></span> Tracker · <a href="index.html">Titan Tracker</a> · <a href="titans-list.html">120 Titans</a> · Point & Line 🌈
</div>

<script>
// URL 파라미터에서 타이탄 정보 추출
const params = new URLSearchParams(location.search);
const titanName = params.get('name') || 'Unknown';
const titanRole = params.get('role') || '';
const titanKeywords = params.get('k') || '';
const titanColor = params.get('color') || '#6366f1';
const titanChannels = (params.get('ch') || '').split(',').filter(Boolean);

// 페이지 세팅
document.getElementById('page-title').textContent = titanName + ' Tracker';
document.getElementById('titan-name').textContent = titanName + ' Tracker';
document.getElementById('titan-role').innerHTML = titanRole;
document.getElementById('titan-footer-name').textContent = titanName;
document.title = titanName + ' Tracker — Titan Tracker';

// 아바타
const initials = titanName.split(' ').map(w => w[0]).join('').substring(0, 2);
const avatarEl = document.getElementById('titan-avatar');
avatarEl.textContent = initials;
avatarEl.style.background = 'linear-gradient(135deg,' + titanColor + ',' + titanColor + '88)';
avatarEl.style.borderColor = titanColor;

// CSS 액센트 동적 적용
document.documentElement.style.setProperty('--accent', titanColor);
document.documentElement.style.setProperty('--accent-light', titanColor);
document.documentElement.style.setProperty('--accent-bg', titanColor + '18');

// 헤더 배경
document.getElementById('titan-header').style.background = 'linear-gradient(135deg,' + titanColor + '18,' + titanColor + '08)';

// 배지 (키워드 기반)
const badges = titanKeywords.split(',').map(k => k.trim()).filter(Boolean);
document.getElementById('titan-badges').innerHTML = badges.map(b =>
  '<span class="badge" style="border-color:' + titanColor + '30;background:' + titanColor + '15;color:' + titanColor + '">' + b + '</span>'
).join('');

// === 피드 섹션 동적 생성 ===
const nameWords = titanName.split(' ');
const lastName = nameWords[nameWords.length - 1];
const feedConfigs = [
  { id: 'main', label: titanName + ' 관련 뉴스', color: titanColor, q: '"' + titanName + '"' },
  { id: 'keyword', label: badges[0] ? badges[0] + ' 뉴스' : '관련 산업', color: '#a855f7', q: badges.slice(0, 2).join(' ') || titanName },
  { id: 'trend', label: '트렌드 & 업계 동향', color: '#22c55e', q: badges.slice(1, 3).join(' ') || titanName + ' industry' },
  { id: 'global', label: titanName + ' (글로벌)', color: '#3b82f6', q: titanName + ' latest', hl: 'en' },
];

const feedContainer = document.getElementById('feed-sections');
feedContainer.innerHTML = feedConfigs.map(f =>
  '<div class="feed-section" id="fs-' + f.id + '">' +
    '<div class="feed-title" onclick="toggleAndLoad(\'' + f.id + '\')"><div class="dot" style="background:' + f.color + '"></div>' + f.label + '</div>' +
    '<div class="feed-list" id="fl-' + f.id + '"></div>' +
  '</div>'
).join('');

// 유틸
function escapeHtml(s) { if (!s) return ''; const d = document.createElement('div'); d.appendChild(document.createTextNode(s)); return d.innerHTML; }
function sanitizeUrl(u) { try { const x = new URL(u); return ['http:', 'https:'].includes(x.protocol) ? u : '#'; } catch { return '#'; } }
function formatDate(ds) { const d = new Date(ds), now = new Date(), diff = Math.floor((now - d) / 864e5); if (!diff) return '오늘'; if (diff === 1) return '어제'; if (diff < 7) return diff + '일 전'; if (diff < 30) return Math.floor(diff / 7) + '주 전'; return d.getFullYear() + '.' + String(d.getMonth() + 1).padStart(2, '0') + '.' + String(d.getDate()).padStart(2, '0'); }
function stripHtml(h) { const t = document.createElement('div'); t.innerHTML = h; return t.textContent || ''; }

const RSS_PROXY = 'https://api.rss2json.com/v1/api.json?rss_url=';
const TRANSLATE_URL = 'https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=ko&dt=t&q=';
async function translateText(t) { if (!t) return ''; try { const r = await fetch(TRANSLATE_URL + encodeURIComponent(t.substring(0, 500))); const d = await r.json(); return d[0].map(s => s[0]).join(''); } catch { return t; } }

const _feedLoaded = {};

async function toggleAndLoad(id) {
  const section = document.getElementById('fs-' + id);
  const list = document.getElementById('fl-' + id);
  const isOpen = section.classList.contains('expanded');

  if (isOpen) { section.classList.remove('expanded'); return; }
  section.classList.add('expanded');

  if (_feedLoaded[id]) return;
  _feedLoaded[id] = true;

  const cfg = feedConfigs.find(f => f.id === id);
  const hl = cfg.hl || 'ko';
  const gl = cfg.hl === 'en' ? 'US' : 'KR';
  const url = 'https://news.google.com/rss/search?q=' + encodeURIComponent(cfg.q) + '&hl=' + hl + '&gl=' + gl;

  list.innerHTML = '<div class="loading"><div class="spinner"></div>로딩 중...</div>';

  // 캐시 체크
  const cacheKey = 'tf_' + titanName.replace(/\s+/g, '_').toLowerCase() + '_' + id;
  try {
    const cached = localStorage.getItem(cacheKey);
    if (cached) {
      const { items, ts } = JSON.parse(cached);
      if (items?.length && Date.now() - ts < 15 * 60 * 1000) {
        await renderFeed(items, list, cfg);
        return;
      }
    }
  } catch (e) {}

  try {
    const res = await fetch(RSS_PROXY + encodeURIComponent(url));
    const data = await res.json();
    if (data.status === 'ok' && data.items?.length) {
      localStorage.setItem(cacheKey, JSON.stringify({ items: data.items, ts: Date.now() }));
      await renderFeed(data.items, list, cfg);
    } else { list.innerHTML = '<div class="error-msg">피드를 찾을 수 없습니다</div>'; }
  } catch (e) { list.innerHTML = '<div class="error-msg">피드 로드 실패</div>'; }
}

async function renderFeed(items, container, cfg) {
  items.sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));
  const sliced = items.slice(0, 8);
  const translations = await Promise.all(sliced.map(async item => {
    const rawDesc = stripHtml(item.description || item.content || '');
    const sentences = rawDesc.match(/[^.!?]+[.!?]+/g);
    const desc = sentences ? sentences.slice(0, 3).join(' ').substring(0, 300) : rawDesc.substring(0, 200);
    const [titleKo, descKo] = await Promise.all([translateText(item.title), desc ? translateText(desc) : Promise.resolve('')]);
    return { titleKo, descKo, title: item.title };
  }));
  container.innerHTML = sliced.map((item, i) => {
    const { titleKo, descKo, title } = translations[i];
    return '<div class="feed-item"><a href="' + sanitizeUrl(item.link) + '" target="_blank" rel="noopener">' +
      '<div class="feed-item-title">' + escapeHtml(titleKo) + '</div>' +
      '<div style="font-size:11px;color:var(--text-muted);font-style:italic;margin-bottom:6px">' + escapeHtml(title) + '</div>' +
      '<div class="feed-item-meta"><span class="feed-source">' + escapeHtml(cfg.label) + '</span><span>' + formatDate(item.pubDate) + '</span>' +
      (item.author ? '<span>by ' + escapeHtml(item.author) + '</span>' : '') + '</div>' +
      (descKo ? '<div class="feed-item-desc">' + escapeHtml(descKo) + '</div>' : '') +
      '</a></div>';
  }).join('');
  // 카운트
  const title = container.closest('.feed-section').querySelector('.feed-title');
  if (title && !title.querySelector('.feed-count')) {
    const cnt = document.createElement('span');
    cnt.className = 'feed-count';
    cnt.style.cssText = 'font-size:10px;color:var(--text-muted);font-family:JetBrains Mono,monospace;margin-left:8px';
    cnt.textContent = sliced.length + '개';
    title.appendChild(cnt);
  }
}

async function loadAllFeeds() {
  for (const cfg of feedConfigs) {
    _feedLoaded[cfg.id] = false;
    const section = document.getElementById('fs-' + cfg.id);
    section.classList.add('expanded');
    await toggleAndLoad(cfg.id);
  }
  document.getElementById('last-updated').textContent = '마지막 업데이트: ' + new Date().toLocaleString('ko-KR', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
}

function switchTab(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === id));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === 'tab-' + id));
}

// === 팩트 프로필 표시 (titans-data.js) ===
function loadProfile() {
  const container = document.getElementById('profile-content');
  if (typeof TITAN_PROFILES === 'undefined') {
    container.innerHTML = '<div style="color:var(--text-muted);text-align:center;padding:2rem">데이터 로딩 중...</div>';
    setTimeout(loadProfile, 500); return;
  }
  const p = TITAN_PROFILES[titanName];
  if (!p) { container.innerHTML = '<div style="color:var(--text-muted);text-align:center;padding:2rem">프로필 데이터 준비 중</div>'; return; }
  container.innerHTML = 
    '<div style="font-size:12px;color:var(--text-sub);line-height:1.7;margin-bottom:1rem;padding:14px;background:var(--surface);border-radius:12px;border-left:3px solid '+titanColor+'">💭 '+escapeHtml(p.philosophy||'')+'</div>'+
    '<div class="profile-grid">'+
      '<div class="profile-card"><h3>🎯 이론 & 프레임워크</h3><ul>'+(p.principles||[]).map(function(t){return '<li>'+escapeHtml(t)+'</li>'}).join('')+'</ul></div>'+
      '<div class="profile-card"><h3>📚 저서 & 콘텐츠</h3><ul>'+(p.books||[]).map(function(b){return '<li><a href="'+sanitizeUrl(b.url||'#')+'" target="_blank" rel="noopener" style="color:var(--accent-light)">'+escapeHtml(b.title)+'</a> <span style="color:var(--text-muted);font-size:10px">'+(b.year||'')+'</span></li>'}).join('')+'</ul></div>'+
      '<div class="profile-card"><h3>💰 투자 관점 & 인사이트</h3><p>'+escapeHtml(p.invest||'')+'</p></div>'+
      '<div class="profile-card"><h3>📅 타임라인</h3><ul>'+(p.timeline||[]).map(function(t){return '<li><strong>'+escapeHtml(t.y)+'</strong> '+escapeHtml(t.t)+'</li>'}).join('')+'</ul></div>'+
    '</div>'+
    (p.signal?'<div style="margin-top:12px;padding:10px 14px;border-radius:8px;background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.15);font-size:11px;color:#fbbf24;display:flex;align-items:center;gap:6px">⚡ <strong>Signal:</strong> '+escapeHtml(p.signal)+'</div>':'')+
    (p.channels?'<div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">'+(p.channels||[]).map(function(c){return '<a href="'+sanitizeUrl(c.url||'#')+'" target="_blank" rel="noopener" style="font-size:10px;padding:4px 10px;border-radius:6px;background:var(--surface);border:1px solid var(--border);color:var(--text-sub);text-decoration:none">🔗 '+escapeHtml(c.name)+'</a>'}).join('')+'</div>':'');
}
setTimeout(loadProfile, 300);
</script>
</body>
</html>
